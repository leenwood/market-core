version: 3
workdir: .

allow:
  depOnAnyVendor: true
  # deepScan checks type flows across DI boundaries — false positives in composition roots (cmd/)
  deepScan: false

excludeFiles:
  - "^.*_test\\.go$"

# ── Components ────────────────────────────────────────────────────────────────
#
# Структура internal/:
#   internal/config/       — конфигурация приложения (общий слой)
#   internal/core/         — бизнес-ядро: domain, port, dto, service, mapper, usecase
#   internal/infra/        — инфраструктура: storage, messaging, outbound
#   internal/platform/     — cross-cutting: logger, metrics, tracing
#   internal/app/          — прикладной код: хендлеры, воркеры, миграции
#
# Layer 0 — Foundation (нет зависимостей на внутренние пакеты)
#   internal/config
#   internal/core/domain
#   internal/core/dto
#   internal/platform/{logger,metrics,tracing}
#
# Layer 1a — Contracts (зависит от Foundation)
#   internal/core/port      (интерфейсы: зависит от domain, dto)
#   internal/core/service   (переиспользуемая бизнес-логика: зависит от dto)
#   internal/core/mapper    (преобразования DTO: зависит от dto)
#
# Layer 1b — Infrastructure (зависит от Foundation + Contracts)
#   internal/infra/storage/memory    (MemoryStore: зависит от dto)
#   internal/infra/storage/{postgres,clickhouse}
#   internal/infra/messaging
#   internal/infra/outbound/{httpclient,notifier}
#
# Layer 2a — Use Cases (зависит от Foundation + Contracts)
#   internal/core/usecase
#
# Layer 2b — Application (зависит от Foundation + Contracts + Use Cases + Infrastructure)
#   internal/app/http/{handler,middleware}
#   internal/app/processor
#
# Bootstrap (internal/app/service, internal/app/migrate) — собирают всё вместе,
# вызываются из cmd/; зависимости не ограничены.
#
# Entrypoints (cmd/*) — точки входа, ограничения не применяются.

components:

  # Layer 0 — Foundation
  Domain:
    in: internal/core/domain
  Dto:
    in: internal/core/dto
  Config:
    in: internal
  Metrics:
    in: internal/platform/metrics
  Logger:
    in: internal/platform/logger
  Tracing:
    in: internal/platform/tracing

  # Layer 1a — Contracts
  Port:
    in: internal/core/port
  Service:
    in: internal/core/service
  Mapper:
    in: internal/core/mapper

  # Layer 1b — Infrastructure (internal/infra/)
  Idempotency:
    in: internal/infra/storage/memory
  PostgresStorage:
    in: internal/infra/storage/postgres
  ClickHouseStorage:
    in: internal/infra/storage/clickhouse
  Messaging:
    in: internal/infra/messaging
  HTTPClient:
    in: internal/infra/outbound/httpclient
  Notifier:
    in: internal/infra/outbound/notifier

  # Layer 2a — Use Cases
  UseCase:
    in: internal/core/usecase

  # Layer 2b — Application (internal/app/)
  AppHTTP:
    in: internal/app/http
  Middleware:
    in: internal/app/http/middleware
  Handler:
    in: internal/app/http/handler
  Processor:
    in: internal/app/processor

  # Bootstrap — собирают зависимости и запускают приложение; вызываются из cmd/
  AppService:
    in: internal/app/service
  Migrate:
    in: internal/app/migrate

  # Entrypoints — только точки входа, без ограничений на зависимости
  ServerCmd:
    in: cmd/server
  WorkerCmd:
    in: cmd/worker
  MigrateCmd:
    in: cmd/migrate

  # Auto-generated swagger docs
  SwaggerDocs:
    in: docs/swagger

# ── Dependency rules ──────────────────────────────────────────────────────────
deps:

  # Layer 0 — Foundation: без внутренних зависимостей
  Domain:
    anyVendorDeps: true
  Dto:
    anyVendorDeps: true
  Config:
    anyVendorDeps: true
  Metrics:
    anyVendorDeps: true
  Logger:
    anyVendorDeps: true
  Tracing:
    anyVendorDeps: true

  # Layer 1a — Contracts
  Port:
    mayDependOn:
      - Domain
      - Dto

  Service:
    mayDependOn:
      - Dto

  Mapper:
    mayDependOn:
      - Dto

  # Layer 1b — Infrastructure
  Idempotency:
    mayDependOn:
      - Dto

  PostgresStorage:
    mayDependOn:
      - Domain
      - Dto
      - Logger
      - Tracing

  ClickHouseStorage:
    mayDependOn:
      - Domain
      - Dto
      - Logger
      - Tracing

  Messaging:
    mayDependOn:
      - Logger
      - Tracing

  HTTPClient:
    mayDependOn:
      - Metrics
      - Logger
      - Tracing

  Notifier:
    mayDependOn:
      - HTTPClient
      - Logger

  # Layer 2a — Use Cases
  UseCase:
    mayDependOn:
      - Domain
      - Dto
      - Port
      - Mapper
      - Logger

  # Layer 2b — Application
  AppHTTP:
    mayDependOn:
      - Domain
      - Dto
      - Port
      - UseCase
      - Handler
      - Middleware
      - Metrics
      - Logger
      - SwaggerDocs

  Middleware:
    mayDependOn:
      - Logger
      - Tracing
      - Metrics

  Handler:
    mayDependOn:
      - Domain
      - Dto
      - Port
      - Service
      - UseCase
      - Metrics
      - Logger
      - Tracing

  Processor:
    mayDependOn:
      - Domain
      - Dto
      - Port
      - Mapper
      - UseCase
      - Messaging
      - Metrics
      - Logger
      - Tracing

  # Bootstrap + Entrypoints: зависимости не ограничены
  AppService:
    anyProjectDeps: true
    anyVendorDeps: true
  Migrate:
    anyProjectDeps: true
    anyVendorDeps: true
  SwaggerDocs:
    anyProjectDeps: true
    anyVendorDeps: true
  MigrateCmd:
    anyProjectDeps: true
    anyVendorDeps: true
  ServerCmd:
    anyProjectDeps: true
    anyVendorDeps: true
  WorkerCmd:
    anyProjectDeps: true
    anyVendorDeps: true
