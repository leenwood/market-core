version: 3
workdir: .

allow:
  depOnAnyVendor: true
  # deepScan checks type flows across DI boundaries — false positives in composition roots (cmd/)
  deepScan: false

excludeFiles:
  - "^.*_test\\.go$"

# ── Components ────────────────────────────────────────────────────────────────
#
# Layer 0 — Foundation (no internal deps)
#   internal/           — config
#   internal/core/domain, internal/core/dto
#   internal/platform/{logger,metrics,tracing}
#
# Layer 1a — Contracts (→ Foundation)
#   internal/core/port, internal/core/mapper
#
# Layer 1b — Infrastructure (→ Foundation + Contracts)
#   internal/infra/storage/postgres
#   internal/infra/outbound/httpclient
#
# Layer 2a — Use Cases (→ Foundation + Contracts)
#   internal/core/usecase
#
# Layer 2b — Application (→ all layers)
#   internal/app/http, internal/app/http/middleware, internal/app/http/handler
#
# Bootstrap — internal/app/service, internal/app/migrate (no restrictions)
# Entrypoints — cmd/server, cmd/migrate (no restrictions)

components:

  # Layer 0 — Foundation
  Domain:
    in: internal/core/domain
  Dto:
    in: internal/core/dto
  Config:
    in: internal
  Metrics:
    in: internal/platform/metrics
  Logger:
    in: internal/platform/logger
  Tracing:
    in: internal/platform/tracing

  # Layer 1a — Contracts
  Port:
    in: internal/core/port
  Mapper:
    in: internal/core/mapper

  # Layer 1b — Infrastructure
  PostgresStorage:
    in: internal/infra/storage/postgres
  HTTPClient:
    in: internal/infra/outbound/httpclient

  # Layer 2a — Use Cases
  UseCase:
    in: internal/core/usecase/**

  # Layer 2b — Application
  AppHTTP:
    in: internal/app/http
  Middleware:
    in: internal/app/http/middleware
  Handler:
    in: internal/app/http/handler

  # Bootstrap
  AppService:
    in: internal/app/service
  Migrate:
    in: internal/app/migrate

  # Entrypoints
  ServerCmd:
    in: cmd/server
  MigrateCmd:
    in: cmd/migrate

  # Auto-generated swagger docs
  SwaggerDocs:
    in: docs/swagger

# ── Dependency rules ──────────────────────────────────────────────────────────
deps:

  # Layer 0 — Foundation: no internal dependencies
  Domain:
    anyVendorDeps: true
  Dto:
    anyVendorDeps: true
  Config:
    anyVendorDeps: true
  Metrics:
    anyVendorDeps: true
  Logger:
    anyVendorDeps: true
  Tracing:
    anyVendorDeps: true

  # Layer 1a — Contracts
  Port:
    mayDependOn:
      - Domain
      - Dto

  Mapper:
    mayDependOn:
      - Domain
      - Dto

  # Layer 1b — Infrastructure
  PostgresStorage:
    mayDependOn:
      - Domain
      - Dto
      - Logger
      - Tracing

  HTTPClient:
    mayDependOn:
      - Metrics
      - Logger
      - Tracing

  # Layer 2a — Use Cases
  UseCase:
    mayDependOn:
      - Domain
      - Dto
      - Port
      - Mapper
      - Logger

  # Layer 2b — Application
  AppHTTP:
    mayDependOn:
      - Config
      - Domain
      - Dto
      - Port
      - UseCase
      - Handler
      - Middleware
      - Metrics
      - Logger
      - SwaggerDocs

  Middleware:
    mayDependOn:
      - Logger
      - Tracing
      - Metrics

  Handler:
    mayDependOn:
      - Domain
      - Dto
      - Port
      - UseCase
      - Metrics
      - Logger
      - Tracing

  # Bootstrap + Entrypoints: unrestricted
  AppService:
    anyProjectDeps: true
    anyVendorDeps: true
  Migrate:
    anyProjectDeps: true
    anyVendorDeps: true
  SwaggerDocs:
    anyProjectDeps: true
    anyVendorDeps: true
  MigrateCmd:
    anyProjectDeps: true
    anyVendorDeps: true
  ServerCmd:
    anyProjectDeps: true
    anyVendorDeps: true
