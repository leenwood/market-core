services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
      POSTGRES_DB: market_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market -d market_core"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_DSN: "postgres://market:market@postgres:5432/market_core?sslmode=disable"
      HTTP_ADDR: ":8080"
      LOG_LEVEL: "info"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
