version: "3"

vars:
  BINARY_SERVER: bin/server
  BINARY_MIGRATE: bin/migrate
  MODULE: market-core
  GOFLAGS: -trimpath -ldflags="-s -w"

dotenv: ['.env']

env:
  CGO_ENABLED: "0"

tasks:

  default:
    desc: List all available tasks
    silent: true
    cmds:
      - task --list

  # ── Build ──────────────────────────────────────────────────────────────────

  build:
    desc: Build all binaries (server, migrate)
    deps: [build:server, build:migrate]

  build:server:
    desc: Build server binary → bin/server
    cmds:
      - go build {{.GOFLAGS}} -o {{.BINARY_SERVER}} ./cmd/server

  build:migrate:
    desc: Build migrate binary → bin/migrate
    cmds:
      - go build {{.GOFLAGS}} -o {{.BINARY_MIGRATE}} ./cmd/migrate

  # ── Run ───────────────────────────────────────────────────────────────────

  run:
    desc: Run HTTP server locally (reads .env)
    cmds:
      - go run ./cmd/server

  run:worker:
    desc: Run async event worker locally (reads .env)
    cmds:
      - go run ./cmd/worker

  # ── Test ──────────────────────────────────────────────────────────────────

  test:
    desc: Run unit tests with race detector
    cmds:
      - go test -race -count=1 -timeout=60s ./...

  test:integration:
    desc: Run integration tests against real containers (requires Docker)
    cmds:
      - go test -race -count=1 -timeout=120s -tags=integration ./...

  test:cover:
    desc: Run tests and produce HTML coverage report (coverage.html)
    cmds:
      - go test -race -count=1 -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report written to coverage.html"

  # ── Code quality ──────────────────────────────────────────────────────────

  lint:
    desc: Run golangci-lint against all packages
    cmds:
      - go tool golangci-lint run ./...

  arch:
    desc: Check architectural dependency rules (.go-arch-lint.yml)
    cmds:
      - go tool go-arch-lint check

  arch:graph:
    desc: Generate architecture dependency graph → docs/arch-graph.svg
    cmds:
      - go tool go-arch-lint graph --out docs/arch-graph.svg
      - echo "Graph saved to docs/arch-graph.svg"

  fmt:
    desc: Format all Go source files with gofmt and goimports
    cmds:
      - go fmt ./...
      - goimports -w .

  vet:
    desc: Run go vet against all packages
    cmds:
      - go vet ./...

  # ── Docker ────────────────────────────────────────────────────────────────

  docker:up:
    desc: Start infrastructure containers (postgres)
    cmds:
      - docker compose up -d postgres

  docker:down:
    desc: Stop all containers
    cmds:
      - docker compose down

  docker:reset:
    desc: Stop containers and wipe all volumes (destructive)
    cmds:
      - docker compose down -v

  docker:logs:
    desc: Stream logs from all running containers
    cmds:
      - docker compose logs -f

  # ── Migrations ────────────────────────────────────────────────────────────

  migrate:up:
    desc: Apply all pending PostgreSQL migrations
    cmds:
      - go run ./cmd/migrate -dir={{.MIGRATION_DIR}} up
    vars:
      MIGRATION_DIR:
        sh: echo "${MIGRATION_DIR:-migrations}"

  migrate:down:
    desc: Rollback the last PostgreSQL migration
    cmds:
      - go run ./cmd/migrate -dir={{.MIGRATION_DIR}} down
    vars:
      MIGRATION_DIR:
        sh: echo "${MIGRATION_DIR:-migrations}"

  migrate:status:
    desc: Print migration status for PostgreSQL
    cmds:
      - go run ./cmd/migrate -dir={{.MIGRATION_DIR}} status
    vars:
      MIGRATION_DIR:
        sh: echo "${MIGRATION_DIR:-migrations}"

  migrate:create:
    desc: "Create a new goose migration. Usage: task migrate:create -- <name>"
    cmds:
      - |
        name="{{.CLI_ARGS}}"
        if [ -z "$name" ]; then
          echo "Error: migration name required. Usage: task migrate:create -- <name>" >&2
          exit 1
        fi
        goose -dir migrations create "$name" sql

  # ── Documentation ───────────────────────────────────────────────────────

  docs:
    desc: "Regenerate Swagger docs from handler annotations → swagger/"
    cmds:
      - swag init -g cmd/server/main.go --parseDependency --parseInternal -o docs/swagger

  # ── Dependencies ──────────────────────────────────────────────────────────

  deps:
    desc: Download and tidy Go module dependencies
    cmds:
      - go mod download
      - go mod tidy
